<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlkci.ai v1.1 - Hafıza Güncellemesi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Yan Menü */
        #sidebar { width: 250px; background: #202123; color: white; transition: 0.3s; padding: 20px; position: fixed; height: 100%; left: -290px; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        #sidebar.active { left: 0; }
        #sidebar h3 { border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        #history-list { list-style: none; padding: 0; }
        #history-list li { padding: 12px; background: #343541; margin-bottom: 8px; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px solid transparent; }
        #history-list li:hover { border-color: #10a37f; }

        /* Ana Panel */
        #main-container { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { background: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; }
        .brand-container { text-align: center; flex-grow: 1; }
        .brand-name { font-size: 1.2em; font-weight: bold; display: block; color: #333; }
        .version-tag { font-size: 0.7em; color: #888; font-weight: bold; letter-spacing: 1px; }

        .new-chat-btn { cursor: pointer; position: relative; font-size: 22px; background: none; border: none; }
        .plus-badge { position: absolute; bottom: 0; right: 0; color: #27ae60; font-weight: bold; font-size: 16px; background: white; border-radius: 50%; }

        /* Sohbet Penceresi */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #f9f9f9; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 75%; line-height: 1.5; font-size: 15px; word-wrap: break-word; position: relative; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .chat-image { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }

        /* Giriş Alanı */
        footer { padding: 15px 20px; background: #fff; display: flex; gap: 12px; align-items: center; border-top: 1px solid #ddd; }
        #user-input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
        .btn-circle { width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        #add-btn { background: #f0f0f0; color: #444; }
        #send-btn { background: #007bff; color: white; }
    </style>
</head>
<body>

    <div id="sidebar">
        <button onclick="toggleMenu()" style="color:white; background:none; border:none; cursor:pointer; float:right; font-size: 20px;">✕</button>
        <h3>Sohbet Geçmişi</h3>
        <ul id="history-list"></ul>
    </div>

    <div id="main-container">
        <header>
            <button id="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="brand-container">
                <span class="brand-name">İlkci.ai</span>
                <span class="version-tag">v1.1</span>
            </div>
            <button class="new-chat-btn" onclick="resetChat()">
                📄<span class="plus-badge">+</span>
            </button>
        </header>

        <main id="chat-window"></main>

        <footer>
            <button class="btn-circle" id="add-btn" onclick="document.getElementById('file-input').click()">+</button>
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(event)">
            <input type="text" id="user-input" placeholder="Bir şeyler yazın..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="btn-circle" id="send-btn" onclick="sendMessage()">➤</button>
        </footer>
    </div>

    <script>
        let isFirstMessage = true;

        // Sayfa yüklendiğinde hafızadan verileri çek
        window.onload = () => {
            loadFromMemory();
        };

        const safetyRules = [
            { keywords: ["18+", "kız videosu", "porno"], response: "Ben sapık bir yapay zeka değilim ve olmayacağım da. Size bu konuda asla yardım edemem." },
            { keywords: ["hack", "hacker", "hesap çalma"], response: "Hack gibi yasal sorun çıkartabilecek konulara yardım edemem. Başka yasal konularda yardımcı olabilirim." },
            { keywords: ["kaynak kodu kopyala"], response: "Güvenlik ve telif hakları nedeniyle yardım edemem." },
            { keywords: ["öldürmek", "tehdit", "mezar kazmak"], response: "Birini öldürme veya tehdit mesajları konusunda hiçbir şey yapamam. Bunun için geliştirilmedim." },
            { keywords: ["atatürk", "mustafa kemal"], response: "Sana bir şey diyeceğim; sen hiç Atatürk'ün ne yaptığını bilmeden konuştuğun için sana küfür edemem. Ben Osmanlı'yı da Atatürk'ü de severim. İkisinden birine küfür etmenin anlamı ne?" },
            { keywords: ["osmanlı"], response: "Osmanlı senin yaptığın işlerin 10 katını yaptı. Atalarımıza küfür etmek Türklere yakışıyor mu?" }
        ];

        const knowledgeBase = {
            "oyun": { title: "Oyun Yapma Girişimi", response: "Oyun yapmak harika! Kodlamaya mı geçelim yoksa fikir mi üretelim?" },
            "selam": { title: "Tanışma", response: "Selam! Ben İlkci.ai v1.1. Hafızam ve güvenliğimle hizmetindeyim!" }
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // HAFIZA SİSTEMİ
        function saveToMemory() {
            localStorage.setItem('chat_html', document.getElementById('chat-window').innerHTML);
            localStorage.setItem('history_html', document.getElementById('history-list').innerHTML);
            localStorage.setItem('first_msg', isFirstMessage);
        }

        function loadFromMemory() {
            const chat = localStorage.getItem('chat_html');
            const hist = localStorage.getItem('history_html');
            const first = localStorage.getItem('first_msg');
            if (chat) document.getElementById('chat-window').innerHTML = chat;
            if (hist) document.getElementById('history-list').innerHTML = hist;
            if (first !== null) isFirstMessage = (first === 'true');
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }

        function resetChat() {
            if(confirm("Hafızayı temizleyip yeni bir sohbet başlatmak istiyor musun?")) {
                localStorage.clear();
                document.getElementById('chat-window').innerHTML = '';
                document.getElementById('history-list').innerHTML = '';
                isFirstMessage = true;
            }
        }

        function addMessage(sender, text, isImage = false) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${sender === 'AI' ? 'ai-msg' : 'user-msg'}`;
            if (isImage) {
                const img = document.createElement('img'); img.src = text; img.className = "chat-image";
                div.appendChild(img);
            } else { div.textContent = text; }
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            saveToMemory();
            return div;
        }

        function handleImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    addMessage('User', e.target.result, true);
                    setTimeout(() => sendMessage("Görsel gönderildi."), 500);
                };
                reader.readAsDataURL(file);
            }
        }

        async function sendMessage(forcedText = null) {
            const input = document.getElementById('user-input');
            const text = forcedText || input.value;
            if (!text.trim()) return;
            if (!forcedText) { addMessage('User', text); input.value = ''; }

            const thinkingDiv = addMessage('AI', '...');
            let dots = 3;
            const anim = setInterval(() => {
                dots--; if (dots < 1) dots = 3;
                thinkingDiv.textContent = ".".repeat(dots);
            }, 1000);

            setTimeout(() => {
                clearInterval(anim);
                thinkingDiv.remove();
                let response = "Bunu şu anlık cevaplayamıyorum ama öğrenmeye devam ediyorum!";
                let currentTitle = "Yeni Sohbet";
                const msgLower = text.toLowerCase();

                let isViolated = false;
                for (let rule of safetyRules) {
                    if (rule.keywords.some(k => msgLower.includes(k))) {
                        response = rule.response; isViolated = true; break;
                    }
                }
                if (!isViolated) {
                    for (let key in knowledgeBase) {
                        if (msgLower.includes(key)) {
                            response = knowledgeBase[key].response;
                            currentTitle = knowledgeBase[key].title; break;
                        }
                    }
                }

                addMessage('AI', response);

                if (isFirstMessage) {
                    const li = document.createElement('li');
                    li.textContent = currentTitle;
                    document.getElementById('history-list').appendChild(li);
                    isFirstMessage = false;
                    saveToMemory();
                }
            }, 3000);
        }
    </script>
</body>
</html>
